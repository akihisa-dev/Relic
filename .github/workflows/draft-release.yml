name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draft-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./app/package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid app/package.json version: $version" >&2
            exit 1
          fi
          tag="v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Verify app
        working-directory: app
        run: pnpm verify

      - name: Check committed diff whitespace
        run: git diff-tree --check --root -r HEAD

  build:
    name: Build ${{ matrix.platform.name }}
    needs: [prepare, verify]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact: relic-macos
            command: pnpm build:mac:safe
          - name: Windows
            os: windows-latest
            artifact: relic-windows
            command: pnpm build:win:safe
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: app
        run: ${{ matrix.platform.command }}

      - name: Collect macOS assets
        if: runner.os == 'macOS'
        working-directory: app
        shell: bash
        run: |
          mkdir -p release-assets
          find out/make -type f \( -name '*.zip' -o -name '*.dmg' \) -print -exec cp {} release-assets/ \;
          if [ -z "$(find release-assets -type f -print -quit)" ]; then
            echo "No macOS release assets found" >&2
            exit 1
          fi

      - name: Collect Windows assets
        if: runner.os == 'Windows'
        working-directory: app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $packageDir = Get-ChildItem out -Directory | Where-Object { $_.Name -like 'Relic-win32-*' } | Select-Object -First 1
          if (-not $packageDir) {
            Write-Error 'Windows packaged app directory was not found.'
            exit 1
          }
          $zipPath = Join-Path 'release-assets' "Relic-${{ needs.prepare.outputs.version }}-win32-x64.zip"
          Compress-Archive -Path (Join-Path $packageDir.FullName '*') -DestinationPath $zipPath -Force
          if (-not (Test-Path $zipPath)) {
            Write-Error 'Windows release ZIP was not created.'
            exit 1
          }

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: app/release-assets/*
          if-no-files-found: error

  draft-release:
    name: Create draft release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## 変更内容

          - Relic $VERSION のDraft ReleaseをGitHub Actionsで作成しました。

          ## 更新時の注意

          - アプリ内自動更新はまだありません。GitHub Releasesから新しい配布ファイルを取得してください。
          - 未署名ビルドのため、OSの警告が出る場合があります。

          ## 配布ファイル

          - macOS: macOS向けのDMGまたはZIPを使用してください。
          - Windows: Windows向けZIPを展開して使用してください。
          EOF

      - name: Create and push tag
        shell: bash
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Create GitHub draft release
        shell: bash
        run: |
          gh release create "$TAG" release-assets/* \
            --draft \
            --title "$TAG" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"
