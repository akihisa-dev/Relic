name: Draft Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: draft-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check tag matches app version
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME:-}"
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            echo "Draft Release workflow must run from a Git tag." >&2
            echo "Actual ref type: ${GITHUB_REF_TYPE:-unset}" >&2
            exit 1
          fi

          if [[ ! "$tag_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use MAJOR.MINOR.PATCH format." >&2
            echo "Actual: $tag_name" >&2
            exit 1
          fi

          version="$(node -p "require('./app/package.json').version")"
          expected_tag="${version}"
          if [ "$tag_name" != "$expected_tag" ]; then
            echo "Release tag must match app/package.json version." >&2
            echo "Expected: $expected_tag" >&2
            echo "Actual:   $tag_name" >&2
            exit 1
          fi

  build-macos:
    name: Build macOS
    needs: validate-release-tag
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        working-directory: app
        run: pnpm build:mac:safe

      - name: Check macOS runner architecture
        shell: bash
        run: |
          if [ "$(uname -m)" != "arm64" ]; then
            echo "macos-latest must produce the arm64 release asset." >&2
            echo "Actual architecture: $(uname -m)" >&2
            exit 1
          fi

      - name: Create macOS release ZIP
        working-directory: app
        shell: bash
        run: |
          mkdir -p release-assets
          app_bundle="$(find out/darwin -name 'Relic.app' -type d -print -quit)"
          if [ -z "$app_bundle" ]; then
            echo "Relic.app was not found under app/out/darwin." >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_bundle" release-assets/Relic-macOS-arm64.zip
          test -f release-assets/Relic-macOS-arm64.zip
          (
            cd release-assets
            shasum -a 256 Relic-macOS-arm64.zip > Relic-macOS-arm64.zip.sha256
          )
          test -f release-assets/Relic-macOS-arm64.zip.sha256

      - name: Upload macOS release ZIP
        uses: actions/upload-artifact@v7
        with:
          name: Relic-macOS-arm64
          path: |
            app/release-assets/Relic-macOS-arm64.zip
            app/release-assets/Relic-macOS-arm64.zip.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: validate-release-tag
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        working-directory: app
        run: pnpm build:win:safe

      - name: Create Windows release ZIP
        working-directory: app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $packageDir = Get-ChildItem out/win32 -Directory | Where-Object { $_.Name -like 'Relic-win32-*' } | Select-Object -First 1
          if (-not $packageDir) {
            Write-Error 'Windows packaged app directory was not found under app/out/win32.'
            exit 1
          }
          Compress-Archive -Path $packageDir.FullName -DestinationPath release-assets/Relic-Windows.zip -Force
          if (-not (Test-Path release-assets/Relic-Windows.zip)) {
            Write-Error 'Relic-Windows.zip was not created.'
            exit 1
          }
          $hash = (Get-FileHash release-assets/Relic-Windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path release-assets/Relic-Windows.zip.sha256 -Value "$hash  Relic-Windows.zip" -NoNewline
          if (-not (Test-Path release-assets/Relic-Windows.zip.sha256)) {
            Write-Error 'Relic-Windows.zip.sha256 was not created.'
            exit 1
          }

      - name: Upload Windows release ZIP
        uses: actions/upload-artifact@v7
        with:
          name: Relic-Windows
          path: |
            app/release-assets/Relic-Windows.zip
            app/release-assets/Relic-Windows.zip.sha256
          if-no-files-found: error

  draft-release:
    name: Create draft release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Ensure GitHub draft release
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use MAJOR.MINOR.PATCH format." >&2
            echo "Actual: $TAG_NAME" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')"

            if [ "$is_draft" != "true" ]; then
              echo "Release already exists and is not a draft: $TAG_NAME" >&2
              echo "Refusing to overwrite assets on a published release." >&2
              exit 1
            fi

            echo "Draft release already exists: $TAG_NAME"
          else
            gh release create "$TAG_NAME" \
              --draft \
              --generate-notes \
              --title "$TAG_NAME" \
              --verify-tag
          fi

      - name: Verify release asset checksums
        shell: bash
        run: |
          set -euo pipefail

          is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')"
          if [ "$is_draft" != "true" ]; then
            echo "Release is not a draft at upload time: $TAG_NAME" >&2
            echo "Refusing to overwrite assets on a published release." >&2
            exit 1
          fi

          required_assets=(
            "release-assets/Relic-macOS-arm64.zip"
            "release-assets/Relic-macOS-arm64.zip.sha256"
            "release-assets/Relic-Windows.zip"
            "release-assets/Relic-Windows.zip.sha256"
            "THIRD_PARTY_NOTICES.md"
            "sbom/relic-dependencies.cdx.json"
          )

          for asset in "${required_assets[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "Required release asset was not found: $asset" >&2
              echo "Existing files under release-assets:" >&2
              find release-assets -maxdepth 3 -type f -print >&2 || true
              exit 1
            fi
          done

          (
            cd release-assets
            sha256sum -c Relic-macOS-arm64.zip.sha256
            sha256sum -c Relic-Windows.zip.sha256
          )

      - name: Check release assets do not already exist
        shell: bash
        run: |
          set -euo pipefail

          existing_assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"
          required_asset_names=(
            "Relic-macOS-arm64.zip"
            "Relic-macOS-arm64.zip.sha256"
            "Relic-Windows.zip"
            "Relic-Windows.zip.sha256"
            "THIRD_PARTY_NOTICES.md"
            "relic-dependencies.cdx.json"
          )

          for asset_name in "${required_asset_names[@]}"; do
            if printf '%s\n' "$existing_assets" | grep -Fxq "$asset_name"; then
              echo "Release asset already exists and will not be overwritten: $asset_name" >&2
              echo "Remove the draft asset manually before rerunning this workflow." >&2
              exit 1
            fi
          done

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "$TAG_NAME" \
            release-assets/Relic-macOS-arm64.zip \
            release-assets/Relic-macOS-arm64.zip.sha256 \
            release-assets/Relic-Windows.zip \
            release-assets/Relic-Windows.zip.sha256 \
            THIRD_PARTY_NOTICES.md \
            sbom/relic-dependencies.cdx.json
