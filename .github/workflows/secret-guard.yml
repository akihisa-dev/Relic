name: Secret Guard

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan changed commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan pull request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .githooks/secret-guard.sh --range "${BASE_SHA}..${HEAD_SHA}"

      - name: Scan repository history
        if: github.event_name == 'workflow_dispatch'
        run: .githooks/secret-guard.sh --range HEAD
