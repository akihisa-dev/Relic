name: Secret Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: secret-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-guard:
    name: Secret Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run secret guard self-test
        run: .githooks/secret-guard.sh --self-test

      - name: Check commits for secrets
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          zero=0000000000000000000000000000000000000000
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE_SHA}..HEAD"
          elif [ "${BEFORE_SHA:-}" = "$zero" ]; then
            range="$AFTER_SHA"
          else
            range="${BEFORE_SHA}..${AFTER_SHA}"
          fi

          .githooks/secret-guard.sh --range "$range"
