name: Code CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Run reproducible CI verification
        working-directory: app
        run: pnpm verify:ci

      - name: Run isolated Electron startup smoke
        working-directory: app
        run: xvfb-run --auto-servernum pnpm smoke:electron -- --artifacts-dir artifacts/electron-smoke

      - name: Upload Electron smoke evidence on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-smoke-linux
          path: app/artifacts/electron-smoke
          if-no-files-found: ignore

      - name: Check version policy
        if: github.event_name == 'pull_request'
        working-directory: app
        run: pnpm version:check -- "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
