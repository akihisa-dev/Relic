<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First run mockup</title>
  <link rel="stylesheet" href="mockups.css">
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="traffic">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="app-name">タイトルバー</span>
      </div>
      <nav class="tabs">
        <div class="tab active">初回起動画面</div>
      </nav>
      <div class="title-actions">
        <span>ワークスペース未登録</span>
      </div>
    </header>

    <div class="workspace-empty">
      <section class="setup-panel">
        <p class="eyebrow">First run</p>
        <h1>初回設定ビュー</h1>
        <p>ワークスペースが未登録の状態で表示する開始画面です。</p>
        <p>ここでは、ユーザーが作業対象となるローカルフォルダを登録します。</p>

        <div class="setup-actions">
          <button class="setup-action">
            <span>新規ワークスペース作成</span>
            <span class="badge">主操作</span>
          </button>
          <button class="setup-action">
            <span>既存フォルダを開く</span>
            <span>Local</span>
          </button>
          <button class="setup-action">
            <span>GitHubリポジトリをクローン</span>
            <span>GitHub</span>
          </button>
        </div>
      </section>
    </div>

    <footer class="statusbar">
      <div class="status-group"><span>ステータスバー</span><span>初回起動状態</span></div>
      <div class="status-group"><span>ワークスペース未登録</span></div>
    </footer>
  </div>
  <script src="mockup-nav.js"></script>
</body>
</html>
