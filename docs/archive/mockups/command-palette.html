<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Command palette mockup</title>
  <link rel="stylesheet" href="mockups.css">
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="traffic">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="app-name">Relic</span>
      </div>
      <nav class="tabs">
        <div class="tab active">第一章.md</div>
      </nav>
      <div class="title-actions">
        <span>main</span>
        <span>保存済み</span>
      </div>
    </header>

    <div class="body">
      <aside class="sidebar">
        <nav class="rail">
          <button class="rail-button active" title="Files">F</button>
          <button class="rail-button" title="Search">S</button>
          <button class="rail-button" title="Git">G</button>
          <button class="rail-button" title="Settings">●</button>
        </nav>
        <section class="side-content">
          <div class="workspace">
            <p class="eyebrow">Workspace</p>
            <div class="workspace-name"><span>Novel Notes</span><span class="badge">Files</span></div>
          </div>
          <div class="side-scroll">
            <div class="list-item active">📄 第一章</div>
            <div class="list-item">📄 登場人物</div>
            <div class="list-item">📄 世界観</div>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="toolbar">
          <div class="tool-group">
            <button class="icon-button">B</button>
            <button class="icon-button">I</button>
            <button class="icon-button">Link</button>
          </div>
          <div class="tool-group">
            <button class="icon-button active">⌘⇧P</button>
          </div>
        </div>
        <section class="editor-layout">
          <div class="editor-shell">
            <article class="editor-page">
              <h1>第一章</h1>
              <p>コマンドパレットはメインエリア上のモーダルとして開く。</p>
            </article>
          </div>
          <aside class="right-panel">
            <div class="panel-title"><span>アウトライン</span></div>
            <div class="result-item active">第一章</div>
          </aside>
        </section>
      </main>
    </div>

    <div class="modal-backdrop">
      <section class="modal">
        <div class="modal-input">分割</div>
        <div class="modal-list">
          <div class="modal-row active"><span>表示: 分割表示を切り替え</span><span class="shortcut">⌘\</span></div>
          <div class="modal-row"><span>表示: 右パネルを開く</span><span class="shortcut">⌘⇧B</span></div>
          <div class="modal-row"><span>検索: 検索ビューを開く</span><span class="shortcut">⌘⇧F</span></div>
          <div class="modal-row"><span>ファイル: 新規ノート作成</span><span class="shortcut">⌘N</span></div>
          <div class="modal-row"><span>Git: 手動同期</span><span class="shortcut"></span></div>
        </div>
      </section>
    </div>

    <footer class="statusbar">
      <div class="status-group"><span>Command palette</span><span>5 commands</span></div>
      <div class="status-group"><span>Escapeで閉じる</span></div>
    </footer>
  </div>
  <script src="mockup-nav.js"></script>
</body>
</html>
