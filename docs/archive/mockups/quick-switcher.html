<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick switcher mockup</title>
  <link rel="stylesheet" href="mockups.css">
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="traffic">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="app-name">Relic</span>
      </div>
      <nav class="tabs">
        <div class="tab active">第一章.md</div>
        <div class="tab">世界観.md</div>
      </nav>
      <div class="title-actions">
        <span>main</span>
        <span>保存済み</span>
      </div>
    </header>

    <div class="body">
      <aside class="sidebar">
        <nav class="rail">
          <button class="rail-button active" title="Files">F</button>
          <button class="rail-button" title="Search">S</button>
          <button class="rail-button" title="Git">G</button>
          <button class="rail-button" title="Settings">●</button>
        </nav>
        <section class="side-content">
          <div class="workspace">
            <p class="eyebrow">Workspace</p>
            <div class="workspace-name"><span>Novel Notes</span><span class="badge">Files</span></div>
          </div>
          <div class="side-scroll">
            <div class="list-item active">📄 第一章</div>
            <div class="list-item">📄 世界観</div>
            <div class="list-item">📄 drafts/登場人物</div>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="toolbar">
          <div class="tool-group"><button class="icon-button active">⌘P</button></div>
          <div class="tool-group"><button class="icon-button">分割</button></div>
        </div>
        <section class="editor-layout">
          <div class="editor-shell">
            <article class="editor-page">
              <h1>第一章</h1>
              <p>クイックスイッチャーは現在のワークスペース内の `.md` のみを表示する。</p>
            </article>
          </div>
          <aside class="right-panel">
            <div class="panel-title"><span>リンク</span></div>
            <div class="result-item">世界観</div>
          </aside>
        </section>
      </main>
    </div>

    <div class="modal-backdrop">
      <section class="modal">
        <div class="modal-input">とうじょう</div>
        <div class="modal-list">
          <div class="modal-row active"><span>登場人物.md</span><span class="shortcut">drafts/</span></div>
          <div class="modal-row"><span>登場人物メモ.md</span><span class="shortcut">ideas/</span></div>
          <div class="modal-row"><span>人物相関図.md</span><span class="shortcut">references/</span></div>
          <div class="modal-row"><span>第一章.md</span><span class="shortcut">既に開いているタブ</span></div>
        </div>
      </section>
    </div>

    <footer class="statusbar">
      <div class="status-group"><span>Quick switcher</span><span>4 files</span></div>
      <div class="status-group"><span>Enterで開く</span></div>
    </footer>
  </div>
  <script src="mockup-nav.js"></script>
</body>
</html>
