<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Right panel mockup</title>
  <link rel="stylesheet" href="mockups.css">
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="traffic">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="app-name">Relic</span>
      </div>
      <nav class="tabs">
        <div class="tab active">世界観.md</div>
      </nav>
      <div class="title-actions">
        <span>main</span>
        <span>保存済み</span>
      </div>
    </header>

    <div class="body">
      <aside class="sidebar">
        <nav class="rail">
          <button class="rail-button active" title="Files">F</button>
          <button class="rail-button" title="Search">S</button>
          <button class="rail-button" title="Git">G</button>
          <button class="rail-button" title="Settings">●</button>
        </nav>
        <section class="side-content">
          <div class="workspace">
            <p class="eyebrow">Workspace</p>
            <div class="workspace-name"><span>Novel Notes</span><span class="badge">Files</span></div>
          </div>
          <div class="side-scroll">
            <div class="list-item active">📄 世界観</div>
            <div class="list-item">📄 地名一覧</div>
            <div class="list-item">📄 登場人物</div>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="toolbar">
          <div class="tool-group">
            <button class="icon-button">B</button>
            <button class="icon-button">I</button>
            <button class="icon-button">Link</button>
          </div>
          <div class="tool-group">
            <button class="icon-button">Outline</button>
            <button class="icon-button active">Links</button>
          </div>
        </div>

        <section class="editor-layout">
          <div class="editor-shell">
            <article class="editor-page">
              <h1>世界観</h1>
              <h2>古い港町</h2>
              <p>町の中心には、貨物線の跡地と古い灯台が残っている。</p>
              <p>関連する資料は <span class="link">[[地名一覧]]</span> と <span class="link">[[年表]]</span> にまとめる。</p>
              <h2>組織</h2>
              <p>記録局、港湾組合、古書店街が物語の背景になる。</p>
            </article>
          </div>

          <aside class="right-panel">
            <div class="panel-title">
              <span>リンク</span>
              <span class="badge">右パネル</span>
            </div>
            <div class="section-title">Backlinks</div>
            <div class="result-item active">第一章 <span class="muted">世界観への参照</span></div>
            <div class="result-item">登場人物 <span class="muted">港町の出身</span></div>
            <div class="section-title">Outgoing</div>
            <div class="result-item">地名一覧</div>
            <div class="result-item">年表</div>
            <div class="section-title">Outline切替</div>
            <div class="result-item">見出し一覧へ切り替え</div>
          </aside>
        </section>
      </main>
    </div>

    <footer class="statusbar">
      <div class="status-group"><span>右パネル: Links</span><span>Backlinks 2</span></div>
      <div class="status-group"><span>892文字</span><span>保存済み</span></div>
    </footer>
  </div>
  <script src="mockup-nav.js"></script>
</body>
</html>
